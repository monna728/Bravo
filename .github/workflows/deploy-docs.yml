# Deploy Swagger UI + openapi.yaml from docs/ to GitHub Pages.
#
# One-time repo setup (maintainer):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# After the first successful run, the site URL is:
#   https://<owner>.github.io/<repository>/
#   e.g. https://monna728.github.io/Bravo/
# Open: .../index.html  (or / if index.html is default — GitHub serves index.html at repo root)

name: Deploy API docs (Swagger UI)

on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-swagger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
